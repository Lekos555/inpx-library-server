services:
  library:
    build: .
    container_name: inpx-library
    image: habsaec/inpx-library-server:latest
    restart: unless-stopped
    # Лимит памяти контейнера (рекомендуется 2g для embedded, 4g для больших библиотек)
    mem_limit: 2g
    ports:
      - "3000:3000"
    volumes:
      # Код и node_modules в именованном томе (в UI Synology раздел «Тома» может отсутствовать —
      # том всё равно есть; смотреть: SSH → docker volume ls).
      - app-code:/app
      # БД, кэш, настройки — именованный том (создаётся автоматически).
      # Порядок строк важен: эта строка должна быть ПОСЛЕ app-code:/app
      # - app-data:/app/data
      # Альтернатива для Synology: bind-mount в видимую папку File Station.
      # Замените строку выше (app-data:/app/data) на:
      - /volume1/docker/inpx-library-data:/app/data
      # Папку нужно создать заранее: mkdir -p /volume1/docker/inpx-library-data
      # - /volume1/books/library:/library:ro
      # Дополнительные источники книг: монтируйте папки в /sources/*
      # и добавьте их через админку (Источники книг → Добавить → тип «Папка»).
      # Пример:
      # - /volume1/homes/username:/sources/home:ro
      # - /home/user/books:/sources/books:ro
    environment:
      - PORT=3000
      - LIBRARY_ROOT=/library
      # SESSION_SECRET генерируется автоматически при первом запуске.
      # Для явного задания раскомментируйте и укажите надёжный ключ (минимум 32 символа):
      # - SESSION_SECRET=your-strong-random-secret-here
    healthcheck:
      # curl вместо node: на Synology проверка через Node часто >5s и падает по таймауту
      test: ["CMD", "curl", "-fsS", "--connect-timeout", "3", "--max-time", "8", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  app-code:
  app-data:
