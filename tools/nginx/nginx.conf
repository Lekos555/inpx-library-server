# nginx кэширование для inpx-library-server
# Размещается как reverse proxy перед приложением

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_refer" '
                  'cache:$upstream_cache_status';

  # ─── Зоны кэша ──────────────────────────────────────────────────────────────
  # Для страниц HTML (короткий TTL, данные редко меняются)
  proxy_cache_path /var/cache/nginx/pages levels=1:2 keys_zone=pages:20m max_size=500m inactive=5m use_temp_path=off;

  # Для статики: CSS, JS, обложки (долгий TTL)
  proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static:50m max_size=2g inactive=7d use_temp_path=off;

  # ─── Правила кэширования ──────────────────────────────────────────────────
  map $request_uri $cache_bypass {
    default 0;
    # API и авторизация — не кэшировать
    ~^/api/ 1;
    ~^/login 1;
    ~^/logout 1;
    ~^/register 1;
    ~^/read/ 1;
    ~^/opds 1;
    # Личные страницы
    ~^/profile 1;
    ~^/shelves 1;
    ~^/favorites 1;
    # POST/DELETE запросы (ниже в location)
  }

  # Заголовок для передачи реального IP
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header Host $host;

  # ─── Upstream: само приложение ──────────────────────────────────────────────
  upstream app {
    server app:3000;
  }

  server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log main;

    # ─── Статика: CSS, JS, PNG, JPG, обложки ─────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://app;
      proxy_cache static;
      proxy_cache_valid 200 1d;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      proxy_cache_background_update on;
      add_header X-Cache-Status $upstream_cache_status always;
      expires 1d;
    }

    # ─── Обложки (отдельно, т.к. долго генерируются) ────────────────────────
    location ~ ^/api/books/[^/]+/cover {
      proxy_pass http://app;
      proxy_cache static;
      proxy_cache_valid 200 7d;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      add_header X-Cache-Status $upstream_cache_status always;
      expires 7d;
    }

    # ─── API и аутентификация — НЕ кэшировать ─────────────────────────────────
    location ~ ^/(api|login|logout|register|read|opds|profile|shelves|favorites) {
      proxy_pass http://app;
      proxy_cache_bypass 1;
      proxy_no_cache 1;
      proxy_connect_timeout 30s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    # ─── HTML-страницы (главная, каталог, книга, библиотека) ──────────────────
    location / {
      proxy_pass http://app;

      # Если запрос содержит куки авторизации — не кэшировать персональные страницы
      if ($http_cookie ~* "(session|auth)") {
        set $cache_bypass 1;
      }

      proxy_cache pages;
      proxy_cache_bypass $cache_bypass;
      proxy_no_cache $cache_bypass;
      proxy_cache_valid 200 5m;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      proxy_cache_background_update on;
      add_header X-Cache-Status $upstream_cache_status always;

      proxy_connect_timeout 30s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }
  }
}
