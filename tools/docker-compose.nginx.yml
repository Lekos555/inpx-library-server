# docker-compose.yml с nginx-кэшированием для inpx-library-server
# Запуск: docker-compose -f docker-compose.nginx.yml up -d

services:
  app:
    image: ghcr.io/habsaec/inpx-library-server:latest
    container_name: inpx-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LIBRARY_PATH=/library
      - SQLITE_PATH=/data
      - SESSION_SECRET=${SESSION_SECRET:?err}
      - ANONYMOUS_DOWNLOAD=true
    volumes:
      - /volume1/books:/library:ro
      - /volume1/docker/inpx/data:/data
    expose:
      - "3000"
    networks:
      - inpx-net

  nginx:
    image: nginx:alpine
    container_name: inpx-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - inpx-net
    depends_on:
      - app

networks:
  inpx-net:
    driver: bridge

volumes:
  nginx-cache:
